# GlitchClock - lokální konfigurace
#
# Tento soubor pulluje package z repo (nebo lokálně) a doplňuje secrets.
# Pro HA remote deploy viz device.yaml.example.

packages:
  glitchclock: !include glitchclock-package.yaml

esphome:
  name: glitchclock
  friendly_name: GlitchClock

# Override external_components to use local source for development
external_components:
  - source: components
    components: [glitchclock]

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "GlitchClock Fallback"
    password: !secret ap_password
